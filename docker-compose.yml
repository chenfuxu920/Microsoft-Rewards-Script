services:
    microsoft-rewards-script:
        build: .
        container_name: microsoft-rewards-script
        restart: unless-stopped

        volumes:
            - ./src/accounts.json:/usr/src/microsoft-rewards-script/dist/accounts.json:ro
            - ./src/config.json:/usr/src/microsoft-rewards-script/dist/config.json:ro
            - ./sessions:/usr/src/microsoft-rewards-script/dist/browser/sessions
            - ./diagnostics:/usr/src/microsoft-rewards-script/diagnostics
            - ./logs:/usr/src/microsoft-rewards-script/logs

        environment:
            TZ: 'Asia/Shanghai'
            NODE_ENV: 'production'
            CRON_SCHEDULE: '0 7,20 * * *'
            RUN_ON_START: 'true'
            PLAYWRIGHT_BROWSERS_PATH: '/usr/src/microsoft-rewards-script/pw-browsers'
            PATCHRIGHT_BROWSERS_PATH: '/usr/src/microsoft-rewards-script/pw-browsers'
            SKIP_RANDOM_SLEEP: 'false'
            # 内存优化配置
            NODE_OPTIONS: '--max-old-space-size=3072 --expose-gc'
            # 内存监控（可选，启用后会定期检查内存使用）
            ENABLE_MEMORY_MONITOR: 'false'
            MAX_MEMORY_PERCENT: '85'
            CHECK_INTERVAL: '300'
            # 超时配置（小时）
            STUCK_PROCESS_TIMEOUT_HOURS: '8'

        # 资源限制
        mem_limit: 3.5g
        memswap_limit: 3.5g
        mem_reservation: 512m
        cpus: 4
        # 浏览器需要共享内存
        shm_size: '2gb'

        healthcheck:
            test: ['CMD', 'sh', '-c', 'pgrep cron > /dev/null || exit 1']
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 30s

        security_opt:
            - no-new-privileges:true

        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

        # 可选：每天凌晨3点自动重启容器（防止长期运行累积问题）
        labels:
            - "autoheal=true"
            - "autoheal.stop.signal=SIGTERM"
